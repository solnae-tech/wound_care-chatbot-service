version: '3.8'

services:
  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: medical_chatbot_rabbitmq
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - chatbot_network

  # FastAPI Application (API Server)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical_chatbot_api
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CLOUDAMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - chatbot_network
    restart: unless-stopped

  # Worker (Consumer)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical_chatbot_worker
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CLOUDAMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: python -m app.queue.consumer
    networks:
      - chatbot_network
    restart: unless-stopped
    deploy:
      replicas: 2  # Run 2 worker instances for redundancy

volumes:
  rabbitmq_data:
    driver: local

networks:
  chatbot_network:
    driver: bridge
